<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Profile Under Construction</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    overflow:hidden;
    color:white;
}

/* Floating circles */
.circle{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.08);
    animation:float 8s infinite ease-in-out;
}

.circle:nth-child(1){
    width:180px;
    height:180px;
    top:10%;
    left:10%;
}

.circle:nth-child(2){
    width:120px;
    height:120px;
    bottom:15%;
    right:15%;
    animation-delay:2s;
}

.circle:nth-child(3){
    width:80px;
    height:80px;
    top:20%;
    right:20%;
    animation-delay:4s;
}

@keyframes float{
    0%,100%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-30px);
    }
}

.container{
    text-align:center;
    z-index:10;
    padding:40px;
}

.avatar{
    width:130px;
    height:130px;
    border-radius:50%;
    border:4px solid #38bdf8;
    margin:0 auto 25px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:55px;
    background:rgba(255,255,255,0.08);
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%{
        box-shadow:0 0 0 0 rgba(56,189,248,.6);
    }
    70%{
        box-shadow:0 0 0 25px rgba(56,189,248,0);
    }
    100%{
        box-shadow:0 0 0 0 rgba(56,189,248,0);
    }
}

h1{
    font-size:3rem;
    margin-bottom:10px;
}

p{
    color:#cbd5e1;
    font-size:1.1rem;
    margin-bottom:30px;
}

.loader{
    display:flex;
    justify-content:center;
    gap:10px;
}

.loader span{
    width:14px;
    height:14px;
    border-radius:50%;
    background:#38bdf8;
    animation:bounce 1.2s infinite ease-in-out;
}

.loader span:nth-child(2){
    animation-delay:0.2s;
}

.loader span:nth-child(3){
    animation-delay:0.4s;
}

@keyframes bounce{
    0%,80%,100%{
        transform:scale(0.5);
        opacity:0.5;
    }
    40%{
        transform:scale(1.2);
        opacity:1;
    }
}

.footer{
    margin-top:25px;
    color:#94a3b8;
    font-size:0.9rem;
}
</style>
</head>
<body>

<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>

<div class="container">
    <div class="avatar">👤</div>

    <h1>Profile Page</h1>
    <p>We're building something awesome. Check back soon!</p>

    <div class="loader">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="footer">
        Under Construction 🚧
    </div>
</div>

</body>
</html>
